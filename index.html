<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hsinchu 3D City Maze</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; font-family: sans-serif; touch-action: none; }
        #hud { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            color: white; background: rgba(0,0,0,0.6); padding: 10px 30px; 
            border-radius: 30px; font-size: 20px; pointer-events: none; 
            z-index: 1000; text-align: center; width: auto; min-width: 200px;
        }
        #compass {
            position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; 
            background: rgba(0,0,0,0.5); border-radius: 50%; border: 2px solid white; z-index: 1000;
        }
        #compass-pivot { width: 100%; height: 100%; position: relative; transition: transform 0.1s ease-out; }
        #compass-arrow { 
            position: absolute; top: 10px; left: 28px; width: 4px; height: 40px; 
            background: linear-gradient(to bottom, #ff0000 50%, #ffffff 50%); border-radius: 2px;
        }
        #compass-n { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); color: white; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; }

        #debug-info {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); 
            color: lime; padding: 10px; font-family: monospace; font-size: 11px; 
            pointer-events: none; border-radius: 5px; z-index: 1000;
        }

        /* 操作區樣式 */
        .control-zone {
            position: absolute; bottom: 30px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; z-index: 100; touch-action: none;
        }
        #rotation-zone { left: 30px; } /* 避開左側返回手勢 */
        #joystick-zone { right: 30px; } /* 避開右側邊緣 */
        
        .zone-label {
            position: absolute; top: -25px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 12px; font-weight: bold;
        }

        #joystick-base {
            position: absolute; top: 20px; left: 20px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.5); border-radius: 50%;
        }
        #rotation-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="hud">目前路段：新竹火車站</div>
    
    <div id="compass">
        <div id="compass-pivot">
            <div id="compass-arrow"></div>
            <div id="compass-n">N</div>
        </div>
    </div>

    <div id="debug-info">
        POS: <span id="debug-pos">0, 0</span><br>
        JOY: <span id="debug-joy">0, 0</span><br>
        ROAD: <span id="debug-road">None</span><br>
        FPS: <span id="debug-fps">0</span>
    </div>
    
    <!-- 手機端觸控 UI -->
    <div id="mobile-controls" style="display: none;">
        <!-- 左側旋轉區 -->
        <div id="rotation-zone" class="control-zone">
            <div class="zone-label">旋轉視角</div>
            <div id="rotation-icon"></div>
        </div>
        <!-- 右側移動區 -->
        <div id="joystick-zone" class="control-zone">
            <div class="zone-label">移動主角</div>
            <div id="joystick-base">
                <div id="joystick-knob"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>

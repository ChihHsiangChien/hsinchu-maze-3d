<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hsinchu 3D City Maze</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; font-family: sans-serif; touch-action: none; }
        #hud { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            color: white; background: rgba(0,0,0,0.6); padding: 10px 30px; 
            border-radius: 30px; font-size: 20px; pointer-events: none; 
            z-index: 1000; text-align: center; width: auto; min-width: 200px;
        }
        
        #compass {
            position: absolute; top: 20px; right: 20px; width: 80px; height: 80px; 
            background: rgba(0,0,0,0.5); border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); z-index: 1000;
        }
        #compass-pivot { width: 100%; height: 100%; position: relative; transition: transform 0.1s ease-out; }
        #compass-arrow { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 2px; height: 60px; background: rgba(255,255,255,0.3);
        }
        #compass-arrow-h { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 2px; background: rgba(255,255,255,0.3);
        }
        
        .compass-label { 
            position: absolute; color: white; font-weight: bold; font-size: 14px; 
            text-shadow: 1px 1px 2px black; transform: translateX(-50%); 
        }
        #label-n { top: 4px; left: 50%; color: #ff4444; }
        #label-s { bottom: 4px; left: 50%; }
        #label-e { right: -2px; top: 50%; transform: translateY(-50%); }
        #label-w { left: 8px; top: 50%; transform: translateY(-50%); }

        #debug-info { display: none; }
        .axis-label { display: none; }

        .control-zone {
            position: absolute; bottom: 30px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; z-index: 100; touch-action: none;
        }
        #rotation-zone { left: 30px; }
        #joystick-zone { right: 30px; }
        #joystick-base {
            position: absolute; top: 20px; left: 20px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.5); border-radius: 50%;
        }
    </style>
</head>
<body>
    <!-- 恢復 HUD 路名顯示 -->
    <div id="hud">正在取得定位...</div>
    
    <!-- 十字指北針 -->
    <div id="compass">
        <div id="compass-pivot">
            <div id="compass-arrow"></div>
            <div id="compass-arrow-h"></div>
            <div id="label-n" class="compass-label">N</div>
            <div id="label-s" class="compass-label">S</div>
            <div id="label-e" class="compass-label">E</div>
            <div id="label-w" class="compass-label">W</div>
        </div>
    </div>

    <!-- 隱藏元素 -->
    <div id="debug-info"></div>
    <div id="label-x" class="axis-label"></div>
    <div id="label-y" class="axis-label"></div>
    <div id="label-z" class="axis-label"></div>
    
    <div id="mobile-controls" style="display: none;">
        <div id="rotation-zone" class="control-zone"></div>
        <div id="joystick-zone" class="control-zone">
            <div id="joystick-base"><div id="joystick-knob"></div></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>

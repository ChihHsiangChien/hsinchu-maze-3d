<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hsinchu 3D City Maze</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; font-family: sans-serif; touch-action: none; }
        #hud { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            color: white; background: rgba(0,0,0,0.6); padding: 10px 30px; 
            border-radius: 30px; font-size: 20px; pointer-events: none; 
            z-index: 1000; text-align: center; width: auto; min-width: 200px;
        }
        
        #compass {
            position: absolute; top: 20px; right: 20px; width: 80px; height: 80px; 
            background: rgba(0,0,0,0.5); border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); z-index: 1000;
        }
        #compass-pivot { width: 100%; height: 100%; position: relative; transition: transform 0.1s ease-out; }
        #compass-arrow { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 2px; height: 60px; background: rgba(255,255,255,0.3);
        }
        #compass-arrow-h { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 2px; background: rgba(255,255,255,0.3);
        }
        
        .compass-label { 
            position: absolute; color: white; font-weight: bold; font-size: 14px; 
            text-shadow: 1px 1px 2px black; transform: translateX(-50%); 
        }
        #label-n { top: 4px; left: 50%; color: #ff4444; }
        #label-s { bottom: 4px; left: 50%; }
        #label-e { right: -2px; top: 50%; transform: translateY(-50%); }
        #label-w { left: 8px; top: 50%; transform: translateY(-50%); }

        /* Info 按鈕樣式 */
        #info-btn {
            position: absolute; top: 35px; right: 110px; width: 45px; height: 45px;
            background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        /* 說明視窗樣式 */
        #info-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .modal-content {
            background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3); max-width: 80%;
        }
        .instruction-grid { display: flex; gap: 40px; margin-top: 20px; text-align: left; }
        .platform { border-top: 2px solid lime; padding-top: 10px; }
        .platform h3 { color: lime; margin-top: 0; }
        kbd { background: #444; padding: 2px 6px; border-radius: 4px; border: 1px solid #888; }

        #debug-info { display: none; }
        .axis-label { display: none; }

        .control-zone {
            position: absolute; bottom: 30px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; z-index: 100; touch-action: none;
        }
        #rotation-zone { left: 30px; }
        #joystick-zone { right: 30px; }
        #joystick-base {
            position: absolute; top: 20px; left: 20px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.5); border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="hud">正在取得定位...</div>
    
    <div id="info-btn">i</div>

    <div id="info-modal">
        <div class="modal-content">
            <h2>🎮 操作引導</h2>
            <div class="instruction-grid">
                <div class="platform">
                    <h3>💻 電腦 (PC)</h3>
                    <p>● <b>移動</b>：<kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></p>
                    <p>● <b>旋轉</b>：滑鼠左鍵點擊畫面任何處並「拖曳」</p>
                    <p>● <b>縮放</b>：滑鼠滾輪</p>
                </div>
                <div class="platform">
                    <h3>📱 手機 (Touch)</h3>
                    <p>● <b>移動</b>：右下角「移動主角」搖桿區</p>
                    <p>● <b>旋轉</b>：左下角「旋轉視角」感應區</p>
                    <p>● <b>目標</b>：跟著黑色道路探索新竹！</p>
                </div>
            </div>
            <p style="margin-top: 30px; opacity: 0.6;">( 點擊任意處關閉 )</p>
        </div>
    </div>

    <div id="compass">
        <div id="compass-pivot">
            <div id="compass-arrow"></div>
            <div id="compass-arrow-h"></div>
            <div id="label-n" class="compass-label">N</div>
            <div id="label-s" class="compass-label">S</div>
            <div id="label-e" class="compass-label">E</div>
            <div id="label-w" class="compass-label">W</div>
        </div>
    </div>

    <!-- 隱藏元素 -->
    <div id="debug-info"></div>
    <div id="label-x" class="axis-label"></div>
    <div id="label-y" class="axis-label"></div>
    <div id="label-z" class="axis-label"></div>
    
    <div id="mobile-controls" style="display: none;">
        <div id="rotation-zone" class="control-zone"></div>
        <div id="joystick-zone" class="control-zone">
            <div id="joystick-base"><div id="joystick-knob"></div></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
        // 簡易 UI 互動邏輯
        const infoBtn = document.getElementById('info-btn');
        const modal = document.getElementById('info-modal');
        infoBtn.onclick = () => modal.style.display = 'flex';
        modal.onclick = () => modal.style.display = 'none';
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hsinchu 3D City Maze</title>
    <style>
        /* 大廳等候畫面 */
        #lobby-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2500; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: #00ffcc; text-align: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(0,255,204,0.3);
            border-top: 5px solid #00ffcc; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 管理員管理面板 */
        #admin-panel {
            position: absolute; left: 20px; top: 120px; width: 300px;
            max-height: 75vh; background: rgba(0,0,0,0.85); border: 2px solid #ff00ff;
            border-radius: 15px; color: white; padding: 15px; z-index: 1100;
            display: none; flex-direction: column; 
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            pointer-events: auto; /* 確保可以點擊 */
        }
        #admin-content { 
            flex: 1; 
            overflow-y: auto; 
            margin-top: 10px;
            padding-right: 5px;
            /* 讓滾動更平滑 */
            -webkit-overflow-scrolling: touch;
        }
        /* 客製化滾動條 */
        #admin-content::-webkit-scrollbar { width: 6px; }
        #admin-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        #admin-content::-webkit-scrollbar-thumb { background: #ff00ff; border-radius: 3px; }

        #player-list { display: flex; flex-direction: column; }
        #admin-panel h3 { margin-top: 0; color: #ff00ff; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .player-item { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; font-size: 14px; background: rgba(255,255,255,0.1);
            padding: 8px; border-radius: 5px;
        }
        .admin-btn { 
            padding: 4px 8px; font-size: 12px; cursor: pointer; border: none; border-radius: 3px; 
            margin-left: 5px; font-weight: bold;
        }
        .btn-allow { background: #00ffcc; color: #000; }
        .btn-reset { background: #ff4444; color: #fff; }

        /* 登入視窗樣式 */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            z-index: 3000; display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .login-box {
            background: rgba(0,0,0,0.5); padding: 40px; border-radius: 30px;
            border: 2px solid #00ffcc; box-shadow: 0 0 20px rgba(0,255,204,0.3);
            max-width: 90%; width: 400px;
        }
        .login-box h1 { margin-top: 0; letter-spacing: 3px; color: #00ffcc; }
        .login-box input {
            width: 80%; padding: 15px; font-size: 18px; border-radius: 10px;
            border: 1px solid #00ffcc; background: rgba(0,0,0,0.3); color: white;
            margin-bottom: 20px; outline: none; text-align: center;
        }
        .login-box button {
            width: 80%; padding: 15px; font-size: 20px; font-weight: bold;
            border-radius: 10px; border: none; background: #00ffcc; color: #000;
            cursor: pointer; transition: transform 0.2s;
        }
        .login-box button:active { transform: scale(0.95); }

        body { 
            margin: 0; overflow: hidden; background-color: #87ceeb; font-family: sans-serif; 
            touch-action: none; 
            user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
            /* ✨ 防止 iPad 佈局偏移與橡皮筋回彈 */
            position: fixed; width: 100vw; height: 100vh; overscroll-behavior: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #hud { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            color: white; background: rgba(0,0,0,0.6); padding: 10px 30px; 
            border-radius: 30px; font-size: 20px; pointer-events: none; 
            z-index: 1000; text-align: center; width: auto; min-width: 200px;
        }
        
        #compass {
            position: absolute; top: 20px; right: 20px; width: 80px; height: 80px; 
            background: rgba(0,0,0,0.5); border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); z-index: 1000;
        }
        #compass-pivot { width: 100%; height: 100%; position: relative; transition: transform 0.1s ease-out; }
        #compass-arrow { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 2px; height: 60px; background: rgba(255,255,255,0.3);
        }
        #compass-arrow-h { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 2px; background: rgba(255,255,255,0.3);
        }
        
        .compass-label { 
            position: absolute; color: white; font-weight: bold; font-size: 18px; 
            text-shadow: 1px 1px 2px black; 
            top: 50%; left: 50%;
            transform-origin: center;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
        }
        #label-n { transform: translate(-50%, -50%) rotate(0deg) translateY(-32px); color: #ff4444; }
        #label-s { transform: translate(-50%, -50%) rotate(180deg) translateY(-32px); }
        #label-e { transform: translate(-50%, -50%) rotate(90deg) translateY(-32px); }
        #label-w { transform: translate(-50%, -50%) rotate(-90deg) translateY(-32px); }

        #info-btn {
            position: absolute; top: 35px; right: 110px; width: 45px; height: 45px;
            background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        #info-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .modal-content {
            background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3); max-width: 80%;
        }
        .instruction-grid { display: flex; gap: 40px; margin-top: 20px; text-align: left; }
        .platform { border-top: 2px solid lime; padding-top: 10px; }
        .platform h3 { color: lime; margin-top: 0; }
        kbd { background: #444; padding: 2px 6px; border-radius: 4px; border: 1px solid #888; }

        .control-zone {
            position: absolute; bottom: 30px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; z-index: 100; touch-action: none;
        }
        #rotation-zone { left: 30px; }
        #joystick-zone { right: 30px; }
        #joystick-base {
            position: absolute; top: 20px; left: 20px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.5); border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>HSINCHU 3D</h1>
            <p>請輸入您的暱稱開始探索</p>
            <input type="text" id="nickname-input" placeholder="您的姓名標籤" maxlength="10">
            <br>
            <button id="join-btn">進入新竹</button>
            <p style="font-size: 12px; margin-top: 20px; opacity: 0.6;">( 支援手機與 PC 跨平台操作 )</p>
        </div>
    </div>

    <div id="lobby-overlay">
        <div class="spinner"></div>
        <h2>已進入大廳</h2>
        <p>管理員正在確認您的身份，請稍候...</p>
    </div>

    <div id="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px;">
            <h3 style="margin: 0; color: #ff00ff;">玩家管理室</h3>
            <button id="admin-toggle-btn" style="background: none; border: 1px solid #ff00ff; color: #ff00ff; cursor: pointer; border-radius: 5px; padding: 2px 8px;">收合</button>
        </div>
        <div id="admin-content">
            <div id="player-list">
                <!-- 玩家列表由 JS 動態生成 -->
            </div>
        </div>
    </div>

    <div id="hud">正在取得定位...</div>
    <div id="info-btn">i</div>

    <div id="info-modal">
        <div class="modal-content">
            <h2>🎮 操作引導</h2>
            <div class="instruction-grid">
                <div class="platform">
                    <h3>💻 電腦 (PC)</h3>
                    <p>● <b>移動</b>：<kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></p>
                    <p>● <b>旋轉</b>：滑鼠左鍵點擊畫面任何處並「拖曳」</p>
                </div>
                <div class="platform">
                    <h3>📱 手機 (Touch)</h3>
                    <p>● <b>移動</b>：右下角「移動主角」搖桿區</p>
                    <p>● <b>旋轉</b>：左下角「旋轉視角」感應區</p>
                </div>
            </div>
            <p style="margin-top: 30px; opacity: 0.6;">( 點擊任意處關閉 )</p>
        </div>
    </div>

    <div id="compass">
        <div id="compass-pivot">
            <div id="compass-arrow"></div>
            <div id="compass-arrow-h"></div>
            <div id="label-n" class="compass-label">北</div>
            <div id="label-s" class="compass-label">南</div>
            <div id="label-e" class="compass-label">東</div>
            <div id="label-w" class="compass-label">西</div>
        </div>
    </div>

    <div id="mobile-controls" style="display: none;">
        <div id="rotation-zone" class="control-zone"></div>
        <div id="joystick-zone" class="control-zone">
            <div id="joystick-base"><div id="joystick-knob"></div></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
        const infoBtn = document.getElementById('info-btn');
        const modal = document.getElementById('info-modal');
        infoBtn.onclick = () => modal.style.display = 'flex';
        modal.onclick = () => modal.style.display = 'none';
    </script>
</body>
</html>
